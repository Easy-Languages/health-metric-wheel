<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Metric Wheel — Easy Languages</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <span class="logo-easy">EASY</span
        ><span class="logo-lang">LANGUAGES</span>
        <span
          style="
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-left: 8px;
          "
          >Team Health</span
        >
      </div>

      <div class="page-title">Health Metric Wheel</div>
      <div class="page-sub">
        Easy Languages team health — averaged from surveys, scored 1–4.
      </div>

      <div class="team-tabs" id="teamTabs"></div>

      <div class="tabs">
        <button class="view-tab active" data-tab="snapshot">
          Latest Snapshot
        </button>
        <button class="view-tab" data-tab="selfreviewer">
          Team vs Reviewer
        </button>
        <button class="view-tab" data-tab="roundround">Round vs Round</button>
      </div>

      <div id="panel-snapshot" class="tab-panel active">
        <div id="snapshot-content"></div>
      </div>

      <div id="panel-selfreviewer" class="tab-panel">
        <div id="selfreviewer-content"></div>
      </div>

      <div id="panel-roundround" class="tab-panel">
        <div class="selrow">
          <label>View</label>
          <select id="roleRR">
            <option value="teamMember">Team</option>
            <option value="reviewer">Reviewer</option>
          </select>
          <label>Round A</label>
          <select id="roundA"></select>
          <span class="vs-badge">vs</span>
          <label>Round B</label>
          <select id="roundB"></select>
        </div>
        <div id="roundround-content"></div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/wheel.js"></script>
    <script src="js/survey.js"></script>
    <script>
      const COLOR_A = "#e07b39";
      const COLOR_B = "#3b6abd";

      let teams = [],
        rounds = [];
      let activeTeam = null;
      let activeTab = "snapshot";
      let latestData = null;

      // ---- helpers ----
      function setContent(id, html) {
        document.getElementById(id).innerHTML = html;
      }
      function spinner() {
        return '<div class="state-msg"><span class="spinner"></span></div>';
      }
      function noData() {
        return '<div class="state-msg">No data yet for this round.</div>';
      }
      function getVal(id) {
        const el = document.getElementById(id);
        return el ? el.value : null;
      }
      function scaleColor(s) {
        return (SCALE[Math.round(s)] || SCALE[MAX]).color;
      }
      function scaleLabel(s) {
        return (SCALE[Math.round(s)] || SCALE[MAX]).label;
      }

      // ---- tab switching ----
      function switchTab(name) {
        activeTab = name;
        document
          .querySelectorAll(".view-tab")
          .forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
        document
          .querySelectorAll(".tab-panel")
          .forEach((p) =>
            p.classList.toggle("active", p.id === "panel-" + name),
          );
        if (name === "roundround") fetchRoundRound();
      }
      document
        .querySelectorAll(".view-tab")
        .forEach((b) =>
          b.addEventListener("click", () => switchTab(b.dataset.tab)),
        );

      // ---- team switching ----
      function switchTeam(name) {
        activeTeam = name;
        document
          .querySelectorAll(".team-tab")
          .forEach((b) => b.classList.toggle("active", b.textContent === name));
        fetchLatest();
        if (activeTab === "roundround") fetchRoundRound();
      }

      // ---- tab 1 + 2: latest round ----
      async function fetchLatest() {
        if (!rounds.length) return;
        setContent("snapshot-content", spinner());
        setContent("selfreviewer-content", spinner());
        try {
          latestData = await fetchScores(activeTeam, rounds[0]);
          console.log("[hmw] fetchScores:", latestData);
        } catch (e) {
          console.error("[hmw] fetchLatest error:", e);
          setContent("snapshot-content", noData());
          setContent("selfreviewer-content", noData());
          return;
        }
        renderSnapshot();
        renderSelfReviewer();
      }

      function renderSnapshot() {
        const el = document.getElementById("snapshot-content");
        el.innerHTML = "";
        if (!latestData?.teamMember?.length) {
          el.innerHTML = noData();
          return;
        }

        const badge = document.createElement("div");
        badge.className = "snapshot-label";
        badge.innerHTML = `Latest round <span class="snapshot-round">${rounds[0]}</span>`;
        el.appendChild(badge);

        const outer = document.createElement("div");
        outer.className = "single-wheel";
        const card = document.createElement("div");
        card.className = "wheel-card";
        renderWheel(card, latestData.teamMember, latestData.categories);
        outer.appendChild(card);
        outer.appendChild(
          buildScoreList(latestData.categories, latestData.teamMember),
        );
        el.appendChild(outer);
      }

      function renderSelfReviewer() {
        const el = document.getElementById("selfreviewer-content");
        el.innerHTML = "";
        if (!latestData?.teamMember?.length) {
          el.innerHTML = noData();
          return;
        }
        const cols = document.createElement("div");
        cols.className = "two-cols";
        [
          ["Team", latestData.teamMember, COLOR_A],
          ["Reviewer", latestData.reviewer, COLOR_B],
        ].forEach(([label, scores, color]) => {
          const col = document.createElement("div");
          col.className = "col";
          const lbl = document.createElement("div");
          lbl.className = "wheel-label";
          lbl.style.color = color;
          lbl.textContent = label;
          col.appendChild(lbl);
          if (scores?.length) {
            const card = document.createElement("div");
            card.className = "wheel-card";
            renderWheel(card, scores, latestData.categories);
            col.appendChild(card);
            col.appendChild(buildScoreList(latestData.categories, scores));
          } else {
            const msg = document.createElement("div");
            msg.className = "state-msg";
            msg.textContent = "No responses yet.";
            col.appendChild(msg);
          }
          cols.appendChild(col);
        });
        el.appendChild(cols);
      }

      // ---- tab 3: round vs round ----
      async function fetchRoundRound() {
        const roundA = getVal("roundA"),
          roundB = getVal("roundB");
        if (!roundA || !roundB) return;
        const key = getVal("roleRR") || "teamMember";
        setContent("roundround-content", spinner());
        try {
          const [dataA, dataB] = await Promise.all([
            fetchScores(activeTeam, roundA),
            fetchScores(activeTeam, roundB),
          ]);
          renderRoundRound(dataA, dataB, roundA, roundB, key);
        } catch (e) {
          setContent("roundround-content", noData());
        }
      }

      function renderRoundRound(dataA, dataB, labelA, labelB, key) {
        const el = document.getElementById("roundround-content");
        el.innerHTML = "";
        const cols = document.createElement("div");
        cols.className = "two-cols";
        [
          [dataA, labelA, COLOR_A],
          [dataB, labelB, COLOR_B],
        ].forEach(([data, label, color]) => {
          const col = document.createElement("div");
          col.className = "col";
          const lbl = document.createElement("div");
          lbl.className = "wheel-label";
          lbl.style.color = color;
          lbl.textContent = label;
          col.appendChild(lbl);
          const scores = data[key];
          if (scores?.length) {
            const card = document.createElement("div");
            card.className = "wheel-card";
            renderWheel(card, scores, data.categories);
            col.appendChild(card);
          } else {
            const msg = document.createElement("div");
            msg.className = "state-msg";
            msg.textContent = "No responses yet.";
            col.appendChild(msg);
          }
          cols.appendChild(col);
        });
        el.appendChild(cols);
        const scoresA = dataA[key], scoresB = dataB[key];
        if (scoresA?.length && scoresB?.length) {
          el.appendChild(
            buildDiffTable(
              dataA.categories,
              scoresA,
              scoresB,
              labelA,
              labelB,
            ),
          );
        }
      }

      // ---- table builders ----
      function buildScoreList(cats, scores) {
        const card = document.createElement("div");
        card.className = "score-list";
        const t = document.createElement("table");
        t.className = "score-table-sm";
        cats.forEach((cat, i) => {
          const s = scores[i];
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${cat}</td>
      <td><span class="pill" style="background:${scaleColor(s)}">${s.toFixed(1)}</span></td>
      <td style="color:${scaleColor(s)};font-weight:600">${scaleLabel(s)}</td>`;
          t.appendChild(tr);
        });
        card.appendChild(t);
        return card;
      }

      function buildDiffTable(cats, scoresA, scoresB, labelA, labelB) {
        const card = document.createElement("div");
        card.className = "diff-table";
        const t = document.createElement("table");
        t.className = "score-table";
        const head = document.createElement("thead");
        head.innerHTML = `<tr>
    <th>Category</th>
    <th style="color:${COLOR_A}">${labelA}</th>
    <th style="color:${COLOR_B}">${labelB}</th>
    <th>Diff</th>
  </tr>`;
        t.appendChild(head);
        const body = document.createElement("tbody");
        cats.forEach((cat, i) => {
          const a = scoresA[i],
            b = scoresB[i];
          const diff = (b - a).toFixed(1);
          const diffStr = diff > 0 ? "+" + diff : diff;
          const diffColor = b > a ? "#3a9b5c" : b < a ? "#e5484d" : "#bbb";
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${cat}</td>
      <td><span class="score-pill" style="background:${scaleColor(a)}">${a.toFixed(1)}</span></td>
      <td><span class="score-pill" style="background:${scaleColor(b)}">${b.toFixed(1)}</span></td>
      <td style="color:${diffColor};font-weight:800">${diffStr}</td>`;
          body.appendChild(tr);
        });
        t.appendChild(body);
        card.appendChild(t);
        return card;
      }

      // ---- team tabs ----
      function buildTeamTabs() {
        const el = document.getElementById("teamTabs");
        el.innerHTML = "";
        teams.forEach((t) => {
          const b = document.createElement("button");
          b.className = "team-tab";
          b.textContent = t;
          if (t === activeTeam) b.classList.add("active");
          b.addEventListener("click", () => switchTeam(t));
          el.appendChild(b);
        });
      }

      // ---- round selectors (tab 3) ----
      function buildRoundSelectors() {
        const selA = document.getElementById("roundA");
        const selB = document.getElementById("roundB");
        rounds.forEach((r, i) => {
          const mkOpt = (sel) => {
            const o = document.createElement("option");
            o.value = r;
            o.textContent = r;
            sel.appendChild(o);
          };
          mkOpt(selA);
          mkOpt(selB);
          if (i === 1) selB.value = r;
        });
        selA.addEventListener("change", fetchRoundRound);
        selB.addEventListener("change", fetchRoundRound);
        document
          .getElementById("roleRR")
          .addEventListener("change", fetchRoundRound);
      }

      // ---- embed mode ----
      if (new URLSearchParams(location.search).has("embed")) {
        document.querySelector(".topbar").style.display = "none";
        document.querySelector(".page-title").style.display = "none";
        document.querySelector(".page-sub").style.display = "none";
        document.body.style.background = "#fff";
      }

      // ---- boot ----
      async function boot() {
        setContent("snapshot-content", spinner());
        setContent("selfreviewer-content", spinner());
        setContent("roundround-content", spinner());
        [teams, rounds] = await Promise.all([fetchTeams(), fetchRounds()]);
        activeTeam = teams[0];
        buildTeamTabs();
        buildRoundSelectors();
        fetchLatest();
      }
      boot();
    </script>
  </body>
</html>
